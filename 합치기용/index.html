<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>픽셀 문화 지도</title>
  <style>
    @import url("https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css");

    :root {
      color-scheme: dark;
      --hud-bg: rgba(255, 255, 255, 0.92);
      --hud-edge: #111111;
      --text: #111111;
      --muted: #666666;
      --accent: #f0002f;
      --good: #204c9a;
      --sea: #12b6c9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #12b6c9;
      font-family: "Galmuri11", "DungGeunMo", "NeoDunggeunmo", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      image-rendering: pixelated;
      -webkit-font-smoothing: none;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--sea);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      image-rendering: pixelated;
    }

    .hud {
      position: fixed;
      z-index: 4;
      color: var(--text);
      pointer-events: none;
      user-select: none;
      text-shadow: none;
    }

    .topbar {
      top: 16px;
      left: 16px;
      display: grid;
      gap: 6px;
      width: min(520px, calc(100vw - 32px));
      min-height: 88px;
      padding: 16px 18px;
      border: 3px solid var(--hud-edge);
      border-radius: 0;
      background: var(--hud-bg);
      box-shadow: 8px 8px 0 #111111;
      backdrop-filter: none;
    }

    .title {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .status-line {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .status-line b {
      color: var(--good);
      font-weight: 700;
    }

    .city-panel {
      right: 16px;
      top: 16px;
      width: min(310px, calc(100vw - 32px));
      min-height: 88px;
      padding: 15px 16px;
      border: 3px solid var(--hud-edge);
      border-radius: 0;
      background: var(--hud-bg);
      box-shadow: 8px 8px 0 #111111;
      backdrop-filter: none;
    }

    .city-panel h2 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .city-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .toast {
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      min-width: min(360px, calc(100vw - 40px));
      padding: 14px 18px;
      border: 3px solid #111111;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.94);
      text-align: center;
      font-size: 19px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
      box-shadow: 6px 6px 0 #111111;
      backdrop-filter: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .location-modal {
      position: fixed;
      inset: 0;
      z-index: 7;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(46, 52, 45, 0.32);
      backdrop-filter: blur(4px);
    }

    .location-modal[hidden] {
      display: none;
    }

    .modal-card {
      width: min(460px, calc(100vw - 48px));
      border: 1px solid rgba(255, 194, 158, 0.62);
      border-radius: 8px;
      background: rgba(36, 42, 35, 0.94);
      box-shadow: 0 24px 60px rgba(20, 24, 18, 0.34);
      color: var(--text);
      overflow: hidden;
    }

    .modal-head {
      position: relative;
      padding: 22px 24px 16px;
      background: linear-gradient(180deg, rgba(255, 207, 218, 0.16), rgba(255, 255, 255, 0));
    }

    .modal-kicker {
      color: #ffcfda;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .modal-card h2 {
      margin: 8px 0 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(244, 248, 234, 0.16);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .modal-body {
      display: grid;
      gap: 16px;
      padding: 0 24px 24px;
    }

    .modal-body p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .modal-actions button {
      min-height: 46px;
      border: 1px solid rgba(244, 248, 234, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .modal-actions button.primary {
      border-color: rgba(255, 180, 93, 0.72);
      background: rgba(255, 180, 93, 0.18);
    }

    .modal-actions button:disabled {
      cursor: default;
      color: rgba(244, 248, 234, 0.52);
      background: rgba(255, 255, 255, 0.04);
    }

    .modal-result,
    .game-feedback {
      min-height: 24px;
      color: #ffcfda;
      font-weight: 700;
    }

    .game-modal {
      position: fixed;
      inset: 0;
      z-index: 9;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(28, 37, 34, 0.42);
      backdrop-filter: blur(5px);
    }

    .game-modal[hidden] {
      display: none;
    }

    .game-card {
      width: min(620px, calc(100vw - 48px));
      max-height: min(700px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid rgba(255, 214, 226, 0.36);
      border-radius: 8px;
      background: rgba(31, 43, 35, 0.96);
      color: var(--text);
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(8, 16, 13, 0.42);
    }

    .game-head {
      position: relative;
      padding: 22px 24px 16px;
      background: linear-gradient(180deg, rgba(255, 180, 93, 0.16), rgba(255, 255, 255, 0));
    }

    .game-kicker {
      color: #ffcfda;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    .game-head h2 {
      margin: 8px 42px 0 0;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .game-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(244, 248, 234, 0.16);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .game-body {
      display: grid;
      gap: 14px;
      overflow-y: auto;
      padding: 0 24px 24px;
    }

    .game-meta,
    .game-prompt,
    .game-cards {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .game-slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .game-slot {
      min-height: 44px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(244, 248, 234, 0.24);
      border-radius: 8px;
      color: rgba(244, 248, 234, 0.72);
      background: rgba(255, 255, 255, 0.05);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .game-slot.filled {
      border-style: solid;
      border-color: rgba(112, 229, 164, 0.52);
      color: var(--text);
      background: rgba(112, 229, 164, 0.14);
    }

    .game-choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .game-choice,
    .game-reset {
      min-height: 44px;
      border: 1px solid rgba(244, 248, 234, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .game-choice.done {
      color: rgba(244, 248, 234, 0.56);
      background: rgba(112, 229, 164, 0.12);
      cursor: default;
    }

    .game-reset {
      width: fit-content;
      padding: 0 14px;
      color: #ffcfda;
    }

    .inventory-toggle {
      position: fixed;
      z-index: 6;
      top: 16px;
      right: 342px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 9px 13px;
      border: 1px solid rgba(255, 214, 226, 0.36);
      border-radius: 8px;
      background: rgba(34, 46, 36, 0.82);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(12, 24, 20, 0.24);
      backdrop-filter: blur(10px);
    }

    .bag-icon {
      position: relative;
      width: 17px;
      height: 16px;
      border: 2px solid #ffcfda;
      border-top-width: 5px;
      border-radius: 4px 4px 5px 5px;
    }

    .bag-icon::before {
      content: "";
      position: absolute;
      left: 3px;
      top: -10px;
      width: 7px;
      height: 7px;
      border: 2px solid #ffcfda;
      border-bottom: 0;
      border-radius: 7px 7px 0 0;
    }

    .inventory-panel {
      position: fixed;
      z-index: 8;
      top: 176px;
      left: 16px;
      width: min(360px, calc(100vw - 32px));
      max-height: min(560px, calc(100vh - 196px));
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 214, 226, 0.34);
      border-radius: 8px;
      background: rgba(29, 42, 34, 0.94);
      color: var(--text);
      box-shadow: 0 18px 48px rgba(10, 18, 16, 0.34);
      backdrop-filter: blur(12px);
    }

    .inventory-panel[hidden] {
      display: none;
    }

    .inventory-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .inventory-head h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .inventory-close {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(244, 248, 234, 0.16);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .inventory-summary {
      min-height: 22px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .inventory-list {
      display: grid;
      gap: 8px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .inventory-item {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      min-height: 64px;
      padding: 10px;
      border: 1px solid rgba(244, 248, 234, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      text-align: left;
      font: inherit;
      cursor: default;
    }

    .inventory-item.is-costume {
      cursor: pointer;
    }

    .inventory-item.is-costume:hover,
    .inventory-item.is-costume:focus-visible,
    .inventory-item.equipped {
      border-color: rgba(112, 229, 164, 0.72);
      background: rgba(112, 229, 164, 0.14);
      outline: none;
    }

    .item-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 180, 93, 0.18);
      color: #ffcfda;
      font-size: 20px;
      font-weight: 900;
      overflow: hidden;
    }

    .item-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: auto;
    }

    .item-name {
      margin: 0 0 3px;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .item-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .inventory-empty {
      padding: 16px 10px;
      border: 1px dashed rgba(244, 248, 234, 0.18);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.45;
    }

    .culture-route-toggle {
      position: fixed;
      z-index: 6;
      right: 16px;
      bottom: 248px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 9px 13px;
      border: 1px solid rgba(255, 214, 226, 0.36);
      border-radius: 8px;
      background: rgba(34, 46, 36, 0.84);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(12, 24, 20, 0.24);
      backdrop-filter: blur(10px);
    }

    .route-icon {
      position: relative;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 12px 9px 0 #70e5a4;
    }

    .route-icon::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 8px;
      width: 16px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255, 250, 241, 0.9);
      transform: rotate(35deg);
      transform-origin: left center;
    }

    .diary-launch-toggle {
      position: fixed;
      z-index: 6;
      right: 16px;
      bottom: 248px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      padding: 10px 14px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff8cf, #c9f4d4);
      color: #3f654e;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(44, 84, 65, 0.22), inset 0 -3px 0 rgba(70, 120, 87, 0.14);
      cursor: pointer;
    }

    .diary-launch-toggle:hover,
    .diary-launch-toggle:focus-visible {
      transform: translateY(-1px);
      outline: none;
      box-shadow: 0 18px 34px rgba(44, 84, 65, 0.28), 0 0 0 3px rgba(255, 248, 207, 0.72);
    }

    .modal-diary-button {
      position: static;
      width: 100%;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 46px;
      border: 1px solid rgba(255, 180, 93, 0.62);
      border-radius: 8px;
      background: rgba(255, 180, 93, 0.18);
      color: var(--text);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .modal-diary-button:hover,
    .modal-diary-button:focus-visible {
      border-color: rgba(255, 180, 93, 0.82);
      background: rgba(255, 180, 93, 0.28);
      outline: none;
    }

    .diary-launch-icon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background:
        linear-gradient(#ffffff 0 0) 50% 31% / 12px 2px no-repeat,
        linear-gradient(#ffffff 0 0) 50% 52% / 12px 2px no-repeat,
        linear-gradient(#ffffff 0 0) 50% 73% / 12px 2px no-repeat,
        linear-gradient(135deg, #69cf8d, #78b7ff);
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.15);
    }

    .diary-app-modal {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(35, 59, 47, 0.44);
      backdrop-filter: blur(10px);
    }

    .diary-app-modal[hidden] {
      display: none;
    }

    .diary-app-shell {
      width: min(1180px, calc(100vw - 28px));
      height: min(820px, calc(100vh - 28px));
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 30px;
      background: #fff8df;
      box-shadow: 0 30px 80px rgba(17, 40, 29, 0.35);
    }

    .diary-app-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px 14px 22px;
      background: linear-gradient(135deg, #fff4bd, #dff7e5);
      color: #355845;
      border-bottom: 1px solid rgba(90, 129, 93, 0.18);
    }

    .diary-app-head p {
      margin: 0 0 2px;
      color: #6f8a78;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .diary-app-head h2 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.1;
    }

    .diary-app-close {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: #ffffff;
      color: #41624d;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(57, 88, 65, 0.18);
      cursor: pointer;
    }

    .diary-app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff8df;
    }

    .culture-modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(22, 30, 27, 0.46);
      backdrop-filter: blur(6px);
    }

    .culture-modal[hidden] {
      display: none;
    }

    .culture-panel {
      width: min(1040px, calc(100vw - 48px));
      max-height: min(760px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid rgba(255, 214, 226, 0.36);
      border-radius: 8px;
      background: rgba(29, 42, 34, 0.97);
      color: var(--text);
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(8, 16, 13, 0.44);
    }

    .culture-head {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 16px;
      background: linear-gradient(180deg, rgba(255, 180, 93, 0.16), rgba(255, 255, 255, 0));
    }

    .culture-kicker {
      color: #ffcfda;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    .culture-head h2 {
      margin: 8px 0 0;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .culture-close {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(244, 248, 234, 0.16);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .culture-content {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
      gap: 18px;
      overflow: hidden;
      padding: 0 24px 24px;
    }

    .route-workspace,
    .diary-workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
    }

    .route-workspace h3,
    .diary-workspace h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .culture-form,
    .diary-form {
      display: grid;
      gap: 10px;
    }

    .culture-fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .diary-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .culture-field {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .culture-field input,
    .culture-field textarea,
    .culture-field select {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(244, 248, 234, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.35;
      outline: none;
    }

    .culture-field input,
    .culture-field select {
      padding: 0 11px;
    }

    .culture-field textarea {
      min-height: 78px;
      resize: vertical;
      padding: 10px 11px;
    }

    .culture-field select option {
      color: #1b241d;
    }

    .culture-field.full {
      grid-column: 1 / -1;
    }

    .culture-submit,
    .diary-submit,
    .recommendation-action,
    .diary-delete {
      min-height: 42px;
      border: 1px solid rgba(255, 180, 93, 0.62);

    function makePixelDiaryTexture(size = 128, base = "#f2f2f2", line = "#d8d8d2", accent = "#ffffff") {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = accent;
      ctx.fillRect(0, 0, size, 18);
      ctx.fillStyle = line;
      for (let i = 0; i <= size; i += 16) {
        ctx.fillRect(i, 0, 2, size);
        ctx.fillRect(0, i, size, 2);
      }
      ctx.fillStyle = "rgba(17,17,17,0.08)";
      ctx.fillRect(64, 0, 2, size);
      ctx.fillRect(0, 64, size, 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      return texture;
    }

    function islandShape(island, steps = 48) {
      const center = project(island.lon, island.lat);
      const shape = new THREE.Shape();
      const angle = island.angle * Math.PI / 180;
      for (let i = 0; i <= steps; i += 1) {
        const t = Math.PI * 2 * i / steps;
        const px = Math.cos(t) * island.rx;
        const pz = Math.sin(t) * island.rz;
        const x = center.x + px * Math.cos(angle) - pz * Math.sin(angle);
        const z = center.z + px * Math.sin(angle) + pz * Math.cos(angle);
        if (i === 0) shape.moveTo(x, z);
        else shape.lineTo(x, z);
      }
      return shape;
    }

    function raisedPatchShape(patch, steps = 42) {

      const angle = patch.angle * Math.PI / 180;

        const wobble = 1 + Math.sin(t * 3.0) * 0.08 + Math.cos(t * 5.0) * 0.05;
        const px = Math.cos(t) * patch.rx * wobble;
        const pz = Math.sin(t) * patch.rz * wobble;
        const x = center.x + px * Math.cos(angle) - pz * Math.sin(angle);
        const z = center.z + px * Math.sin(angle) + pz * Math.cos(angle);
        if (i === 0) shape.moveTo(x, z);
        else shape.lineTo(x, z);
      }
      return shape;
    }

    function makeTerrainPatch(patch) {
      const geometry = new THREE.ExtrudeGeometry(raisedPatchShape(patch), {
        depth: 10,
        bevelEnabled: true,
        bevelSize: 3.2,
        bevelThickness: 2.0,
        bevelSegments: 3,
      });
      geometry.rotateX(-Math.PI / 2);
      geometry.translate(0, LAND_Y + 7, 0);
      const mesh = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({ color: COLORS.terrain, roughness: 0.82, metalness: 0.02 })
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      coastGroup.add(mesh);
      return mesh;
    }

    function makeFlatLandPatch(patch) {
      const center = project(patch.lon, patch.lat);
      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(1, 72),
        new THREE.MeshBasicMaterial({ color: COLORS.land, side: THREE.DoubleSide })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.rotation.z = patch.angle * Math.PI / 180;
      ground.scale.set(patch.rx, patch.rz, 1);
      ground.position.set(center.x, LAND_Y + 1.5, center.z);
      ground.receiveShadow = true;
      coastGroup.add(ground);

      return ground;
    }

    function addRaisedPath(points, options = {}) {
      const {
        color = 0xd0d0ca,
        radius = 1.6,
        y = LAND_Y + 20,
        opacity = 1,
      } = options;
      const curvePoints = points.map(([lon, lat]) => project(lon, lat).setY(y));
      const curve = new THREE.CatmullRomCurve3(curvePoints);
      const geometry = new THREE.TubeGeometry(curve, Math.max(18, points.length * 8), radius, 8, false);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.7,
        metalness: 0.02,
        transparent: opacity < 1,
        opacity,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      coastGroup.add(mesh);
      return mesh;
    }

    function addMountainRange(range) {
      const sampled = [];
      for (let i = 0; i < range.points.length - 1; i += 1) {
        const a = project(range.points[i][0], range.points[i][1]).setY(LAND_Y + 35);
        const b = project(range.points[i + 1][0], range.points[i + 1][1]).setY(LAND_Y + 35);
        for (let step = 0; step <= 14; step += 1) {
          if (i > 0 && step === 0) continue;
          sampled.push(a.clone().lerp(b, step / 14));
        }
      }

      const chunks = [];
      let current = [];
      for (const point of sampled) {
        if (isNearMountainPass(point.x, point.z, range)) {
          if (current.length > 1) chunks.push(current);
          current = [];
        } else {
          current.push(point);
        }
      }
      if (current.length > 1) chunks.push(current);

      chunks.forEach((chunk, chunkIndex) => {
        const curve = new THREE.CatmullRomCurve3(chunk);
        const segments = Math.max(24, chunk.length * 5);
        const foothill = new THREE.Mesh(
          new THREE.TubeGeometry(curve, segments, range.width * 0.15, 12, false),
          new THREE.MeshStandardMaterial({ color: 0xc6d6a6, roughness: 0.9, metalness: 0.01, transparent: true, opacity: 0.72 })
        );
        foothill.castShadow = true;
        foothill.receiveShadow = true;
        coastGroup.add(foothill);

        const base = new THREE.Mesh(
          new THREE.TubeGeometry(curve, segments, 18, 10, false),
          new THREE.MeshStandardMaterial({ color: 0xaec08e, roughness: 0.86, metalness: 0.02 })
        );
        base.castShadow = true;
        base.receiveShadow = true;
        coastGroup.add(base);

        const cap = new THREE.Mesh(
          new THREE.TubeGeometry(curve, segments, 8, 8, false),
          new THREE.MeshStandardMaterial({ color: 0xf7f3dd, roughness: 0.72, metalness: 0.02 })
        );
        cap.castShadow = true;
        coastGroup.add(cap);

        const peakCount = Math.max(2, Math.floor(chunk.length / 5));
        for (let i = 1; i <= peakCount; i += 1) {
          const point = curve.getPoint(i / (peakCount + 1));
          const peak = new THREE.Mesh(
            new THREE.ConeGeometry(24 + ((i + chunkIndex) % 3) * 5, 70 + (i % 2) * 18, 5),
            new THREE.MeshStandardMaterial({ color: i % 2 ? 0xd7d9ad : 0xc4cf9b, roughness: 0.82 })
          );
          peak.position.copy(point).add(new THREE.Vector3(0, 22, 0));
          peak.rotation.y = (i + chunkIndex) * 0.7;
          peak.castShadow = true;
          peak.receiveShadow = true;
          coastGroup.add(peak);
        }
      });
    }

    function addRoad(start, end, ferry = false) {
      const a = cities[start].position;
      const b = cities[end].position;
      const mid = a.clone().lerp(b, 0.5);
      const direction = b.clone().sub(a);
      const normal = new THREE.Vector3(-direction.z, 0, direction.x).normalize();
      const lift = ferry ? 18 : 5;
      const control = mid.add(normal.multiplyScalar(Math.min(320, direction.length() * 0.14)));
      control.y = LAND_Y + lift;
      const curve = new THREE.QuadraticBezierCurve3(
        a.clone().setY(LAND_Y + lift),
        control,
        b.clone().setY(LAND_Y + lift)
      );

      if (ferry) {
        // 페리 경로: 기존 TubeGeometry 유지
        const geometry = new THREE.TubeGeometry(curve, 72, 3.6, 8, false);
        const material = new THREE.MeshStandardMaterial({
          color: COLORS.ferry,
          roughness: 0.58,
          metalness: 0.1,
          transparent: true,
          opacity: 0.75,
        });
        const mesh = new THREE.Mesh(geometry, material);
        roadsGroup.add(mesh);

        const dots = 28;
        for (let i = 1; i < dots; i += 1) {
          const dot = new THREE.Mesh(
            new THREE.SphereGeometry(5.2, 12, 8),
            new THREE.MeshStandardMaterial({ color: 0xe7fbff, emissive: 0x3b9bbb, emissiveIntensity: 0.18 })
          );
          dot.position.copy(curve.getPoint(i / dots));
          roadsGroup.add(dot);
        }
      } else {
        // 일반 도로: 픽셀블록 흙길
        const blockSize = 8.4;
        const blockHeight = 2.8;
        const samplesCount = Math.ceil(direction.length() / (blockSize * 0.6));

        const dirtMaterial = new THREE.MeshStandardMaterial({
          color: COLORS.road,
          roughness: 0.72,
          metalness: 0.01,
        });

        for (let i = 0; i <= samplesCount; i += 1) {
          const t = i / samplesCount;
          const point = curve.getPoint(t);

          // 블록 생성
          const blockGeom = new THREE.BoxGeometry(blockSize, blockHeight, blockSize);
          const blockMesh = new THREE.Mesh(blockGeom, dirtMaterial);
          blockMesh.position.copy(point);
          blockMesh.castShadow = true;
          blockMesh.receiveShadow = true;

          // 랜덤한 높이 변화로 자연스러움 추가
          blockMesh.position.y += Math.sin(i * 0.5) * 0.6 + Math.random() * 0.4;

          roadsGroup.add(blockMesh);
        }

        // 길 가장자리에 흙 입자 효과
        const edgeCount = Math.floor(samplesCount * 0.4);
        const edgeMaterial = new THREE.MeshStandardMaterial({
          color: 0xd98e15,
          roughness: 0.82,
          metalness: 0,
        });

        for (let i = 0; i < edgeCount; i += 1) {
          const t = Math.random();
          const point = curve.getPoint(t);
          const sideOffset = Math.random() * 12 - 6;
          const side = normal.clone().multiplyScalar(sideOffset);

          const edgeGeom = new THREE.BoxGeometry(5, 1.8, 5);
          const edgeMesh = new THREE.Mesh(edgeGeom, edgeMaterial);
          edgeMesh.position.copy(point).add(side);
          edgeMesh.position.y += LAND_Y + 0.8;

          roadsGroup.add(edgeMesh);
        }
      }
    }

    function makeMaterial(color, roughness = 0.66, metalness = 0.02) {
      return new THREE.MeshStandardMaterial({ color, roughness, metalness });
    }

    function shadowed(mesh, receive = false, cast = false) {
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      return mesh;
    }

    function addBox(group, size, pos, material) {
      const mesh = shadowed(new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), material));
      mesh.position.set(pos[0], pos[1], pos[2]);
      group.add(mesh);
      return mesh;
    }

    function addCylinder(group, top, bottom, height, pos, material, segments = 24) {
      const mesh = shadowed(new THREE.Mesh(new THREE.CylinderGeometry(top, bottom, height, segments), material));
      mesh.position.set(pos[0], pos[1], pos[2]);
      group.add(mesh);
      return mesh;
    }

    function addSphere(group, radius, pos, material, scale = [1, 1, 1]) {
      const mesh = shadowed(new THREE.Mesh(new THREE.SphereGeometry(radius, 24, 16), material));
      mesh.position.set(pos[0], pos[1], pos[2]);
      mesh.scale.set(scale[0], scale[1], scale[2]);
      group.add(mesh);
      return mesh;
    }

    function addRoof(group, width, height, depth, pos, material) {
      const roof = shadowed(new THREE.Mesh(new THREE.ConeGeometry(width * 0.72, height, 4), material));
      roof.position.set(pos[0], pos[1], pos[2]);
      roof.rotation.y = Math.PI / 4;
      roof.scale.z = depth / width;
      group.add(roof);
      return roof;
    }

    function addTube(group, points, radius, material, segments = 32) {
      const curve = new THREE.CatmullRomCurve3(points.map((p) => new THREE.Vector3(p[0], p[1], p[2])));
      const mesh = shadowed(new THREE.Mesh(new THREE.TubeGeometry(curve, segments, radius, 8, false), material));
      group.add(mesh);
      return mesh;
    }

    function addCylinderBetween(group, start, end, radius, material, segments = 10) {
      const from = new THREE.Vector3(start[0], start[1], start[2]);
      const to = new THREE.Vector3(end[0], end[1], end[2]);
      const direction = to.clone().sub(from);
      const length = direction.length();
      const mesh = shadowed(new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.78, radius, length, segments), material));
      mesh.position.copy(from.clone().lerp(to, 0.5));
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.normalize());
      group.add(mesh);
      return mesh;
    }

        addCylinder(group, 3, 3, 12, [-18, 35, 0], mats.roof, 10);
        addCylinder(group, 3, 3, 12, [18, 35, 0], mats.roof, 10);
        group.userData.labelLift = 98;

      } else if (style.type === "pavilion") {
        addCylinder(group, 24, 27, 5, [0, 10, 0], mats.stone, 24);
        [-17, 17].forEach((x) => [-12, 12].forEach((z) => addCylinder(group, 2.5, 3, 26, [x, 24, z], mats.wood, 10)));
        addRoof(group, 66, 24, 58, [0, 43, 0], mats.roof);

        addSphere(group, 7, [0, 85, 0], mats.wood, [0.8, 0.7, 0.8]);
        const leaf = addSphere(group, 17, [12, 89, 5], mats.roof, [1.35, 0.42, 0.82]);
        leaf.rotation.z = -0.42;
        leaf.rotation.y = 0.24;
        addSphere(group, 10, [-18, 62, 43], mats.dark, [0.68, 0.86, 0.24]);

        addSphere(group, 8, [32, 49, 42], cheekMat, [1.12, 0.7, 0.22]);
        addSphere(group, 4.5, [-8, 42, 45], mouthMat, [1.25, 0.42, 0.18]);
        addSphere(group, 5.2, [0, 39, 45], mouthMat, [1.25, 0.42, 0.18]);

        addBox(group, [58, 18, 30], [-4, 16, 0], mats.stone);

        addCylinder(group, 6, 8, 46, [30, 39, -4], mats.accent, 18);
        addCylinder(group, 8, 8, 7, [30, 65, -4], mats.light, 18);
        addTube(group, [[-35, 24, -14], [-15, 37, -18], [8, 31, -15]], 2.2, mats.accent, 22);

      } else if (style.type === "industrial") {

      }

      if (style.type !== "orange") {
        group.rotation.y = seededUnit(key.length * 17 + style.accent) * Math.PI * 2;
      }
      return group;

    function addCity(key, label, meta, lon, lat) {
      const pos = project(lon, lat);
      const marker = new THREE.Mesh(
        new THREE.CylinderGeometry(30, 36, 6, 32),
        new THREE.MeshStandardMaterial({ color: COLORS.marker, roughness: 0.58, metalness: 0.03 })
      );
      marker.position.set(pos.x, LAND_Y + 7, pos.z);
      marker.castShadow = true;
      marker.receiveShadow = true;
      cityGroup.add(marker);

      const landmark = buildLandmark(key);
      landmark.position.set(pos.x, LAND_Y + 10, pos.z);
      cityGroup.add(landmark);

      const labelEl = document.createElement("div");
      labelEl.className = "label";
      labelEl.textContent = label;
      labelLayer.append(labelEl);

      cities[key] = {
        key,
        label,
        meta,
        lon,
        lat,
        position: pos,
        node: marker,
        landmark,
        labelEl,
        labelLift: landmark.userData.labelLift || 92,
      };
      cityLabels[key] = labelEl;
    }

    function seededUnit(seed) {
      const value = Math.sin(seed * 12.9898) * 43758.5453;
      return value - Math.floor(value);
    }

    function addCherryTree(x, z, scale = 1) {
      const tree = new THREE.Group();
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x77513a, roughness: 0.84 });
      const branchMat = new THREE.MeshStandardMaterial({ color: 0x654431, roughness: 0.86 });
      const trunkTop = [-2.5 * scale, 29 * scale, 1.5 * scale];
      addCylinderBetween(tree, [0, 0, 0], trunkTop, 4.3 * scale, trunkMat, 10);

      [
        [trunkTop, [-21 * scale, 38 * scale, 2 * scale], 2.2],
        [trunkTop, [18 * scale, 39 * scale, -4 * scale], 2.0],
        [[-1 * scale, 23 * scale, 1 * scale], [-12 * scale, 34 * scale, -15 * scale], 1.8],
        [[-2 * scale, 26 * scale, 1 * scale], [10 * scale, 36 * scale, 13 * scale], 1.8],
      ].forEach(([start, end, radius]) => addCylinderBetween(tree, start, end, radius * scale, branchMat, 8));

      const blossomMat = new THREE.MeshStandardMaterial({ color: 0xffc8d6, roughness: 0.82 });
      const blossomLightMat = new THREE.MeshStandardMaterial({ color: 0xffedf1, roughness: 0.78 });
      const blossomDeepMat = new THREE.MeshStandardMaterial({ color: 0xf4aebe, roughness: 0.82 });
      const canopyOffsets = [
        [0, 38, 0, 12, 1.4, 0.72, 1.05],
        [-15, 36, 3, 10, 1.35, 0.72, 1.0],
        [14, 37, -3, 10, 1.3, 0.7, 1.05],
        [-6, 45, -8, 9, 1.22, 0.72, 0.95],
        [8, 44, 9, 8, 1.18, 0.7, 1.0],
        [-18, 31, -12, 7, 1.0, 0.7, 0.92],
        [20, 32, 12, 7, 1.0, 0.68, 0.92],
      ];
      canopyOffsets.forEach(([cx, cy, cz, radius, sx, sy, sz], index) => {
        const blossom = new THREE.Mesh(
          new THREE.SphereGeometry(radius * scale, 18, 12),
          index % 3 === 0 ? blossomLightMat : index % 3 === 1 ? blossomMat : blossomDeepMat
        );
        blossom.position.set(cx * scale, cy * scale, cz * scale);
        blossom.scale.set(sx, sy, sz);
        blossom.castShadow = true;
        tree.add(blossom);
      });

      tree.position.set(x, LAND_Y + 7, z);
      springGroup.add(tree);
    }

    function addCherryPetal(x, z, seed) {
      const petal = new THREE.Mesh(
        new THREE.SphereGeometry(2.0 + seededUnit(seed + 8) * 1.1, 10, 6),
        new THREE.MeshBasicMaterial({ color: seededUnit(seed + 3) > 0.5 ? 0xffe1e8 : 0xffb8c8, transparent: true, opacity: 0.72 })
      );
      petal.scale.set(2.4, 0.16, 0.9);
      petal.position.set(x, LAND_Y + 16 + seededUnit(seed + 9) * 24, z);
      petal.rotation.set(seededUnit(seed + 1) * 0.4, seed, seededUnit(seed + 2) * 0.5);
      springGroup.add(petal);
    }

      const tree = new THREE.Group();

      const branchMat = new THREE.MeshStandardMaterial({ color: 0x46301f, roughness: 0.9 });
      const leafDarkMat = new THREE.MeshStandardMaterial({ color: 0x123f2d, roughness: 0.86 });
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x1f6f42, roughness: 0.84 });
      const leafLightMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4f, roughness: 0.82 });
      const flowerMats = [
        new THREE.MeshStandardMaterial({ color: 0xff2f73, roughness: 0.7 }),
        new THREE.MeshStandardMaterial({ color: 0xff6f9d, roughness: 0.68 }),
        new THREE.MeshStandardMaterial({ color: 0xffb4c8, roughness: 0.66 }),
      ];
      const trunkTop = [0, 30 * scale, 0];
      addCylinderBetween(tree, [0, 0, 0], trunkTop, 4.2 * scale, trunkMat, 12);
      [
        [trunkTop, [-13 * scale, 39 * scale, 4 * scale], 2.1],
        [trunkTop, [14 * scale, 40 * scale, -3 * scale], 2.0],
        [[0, 23 * scale, 0], [-9 * scale, 35 * scale, -10 * scale], 1.7],
        [[0, 24 * scale, 0], [10 * scale, 36 * scale, 10 * scale], 1.7],
      ].forEach(([start, end, radius]) => addCylinderBetween(tree, start, end, radius * scale, branchMat, 10));

      const canopy = [
        [0, 43, 0, 19, 1.25, 1.05, 1.08],
        [-15, 42, 3, 16, 1.18, 1.0, 1.05],
        [15, 42, -2, 16, 1.16, 0.98, 1.05],

        [23, 36, 9, 12, 1.0, 0.94, 0.95],
        [0, 34, 13, 13, 1.08, 0.88, 0.9],
      ];

          new THREE.SphereGeometry(radius * scale, 18, 12),
          index % 3 === 0 ? leafLightMat : index % 3 === 1 ? leafMat : leafDarkMat
        );
        leaf.position.set(cx * scale, cy * scale, cz * scale);
        leaf.scale.set(sx, sy, sz);
        leaf.castShadow = true;
        tree.add(leaf);

      for (let i = 0; i < 38; i += 1) {

        const height = 35 + seededUnit(i + 91) * 27;
        const radius = 12 + seededUnit(i + 17) * 28;

          new THREE.SphereGeometry((2.0 + seededUnit(i + 5) * 1.35) * scale, 10, 8),

        petal.scale.set(1.7, 0.14, 0.8);
        tree.add(petal);

    function createHelloJejuTexture() {

      ctx.fillStyle = "rgba(14, 17, 17, 0.92)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(132, 74);
      ctx.beginPath();
      ctx.moveTo(50, 220);
      ctx.bezierCurveTo(76, 100, 210, 46, 346, 58);
      ctx.bezierCurveTo(438, 18, 558, 22, 638, 74);
      ctx.bezierCurveTo(752, 82, 858, 150, 860, 246);
      ctx.bezierCurveTo(806, 330, 664, 356, 528, 350);
      ctx.bezierCurveTo(406, 392, 236, 368, 158, 320);
      ctx.bezierCurveTo(88, 324, 30, 292, 50, 220);
      ctx.closePath();
      const mossGradient = ctx.createLinearGradient(80, 70, 800, 360);
      mossGradient.addColorStop(0, "#17351f");
      mossGradient.addColorStop(0.42, "#4f8b48");
      mossGradient.addColorStop(1, "#102817");
      ctx.fillStyle = mossGradient;
      ctx.fill();
      ctx.clip();

      for (let i = 0; i < 760; i += 1) {
        const x = Math.random() * 850;
        const y = Math.random() * 360;
        const r = 3 + Math.random() * 9;
        ctx.fillStyle = Math.random() > 0.54 ? "rgba(132,178,95,0.58)" : "rgba(24,64,36,0.68)";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.font = "bold 94px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = 16;
      ctx.shadowOffsetY = 9;
      ctx.fillStyle = "#ffffff";
      ctx.fillText("HELLO JEJU", 512, 272);
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 11;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(730, 204);
      ctx.lineTo(754, 146);
      ctx.moveTo(754, 146);
      ctx.quadraticCurveTo(718, 124, 682, 156);
      ctx.moveTo(754, 146);
      ctx.quadraticCurveTo(758, 104, 812, 116);
      ctx.moveTo(754, 146);
      ctx.quadraticCurveTo(792, 134, 818, 174);
      ctx.stroke();

      ctx.font = "bold 32px Arial, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText("JEJU PHOTO SPOT", 912, 430);

      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.LinearFilter;
      return texture;

    const rabbits = [];

    class RabbitNPC {
      constructor(x, z, options = {}) {
        this.mesh = buildRabbit();
        this.mesh.position.set(x, PLAYER_Y, z);
        this.homeX = options.homeX ?? x;
        this.homeZ = options.homeZ ?? z;
        this.roamRadius = options.roamRadius ?? 240;
        this.targetX = x;
        this.targetZ = z;
        this.speed = 180; // 플레이어 속도의 약 75% 정도
        this.changeDirectionTimer = 0;
        this.changeDirectionInterval = 120 + Math.random() * 80; // 2-3초
        this.hasGreeted = {};
        this.greetDistance = 300;
      }

      update(playerPos, deltaTime) {
        // 방향 변경 타이머
        this.changeDirectionTimer -= deltaTime * 1000;
        if (this.changeDirectionTimer <= 0) {
          this.setNewTarget(playerPos);
          this.changeDirectionTimer = this.changeDirectionInterval;
        }

        // 목표 위치로 이동
        const dx = this.targetX - this.mesh.position.x;
        const dz = this.targetZ - this.mesh.position.z;
        const dist = Math.hypot(dx, dz);

        if (dist > 5) {
          const moveX = (dx / dist) * this.speed * deltaTime;
          const moveZ = (dz / dist) * this.speed * deltaTime;

          // 충돌 감지 (산, 바다 피하기)
          const nextX = this.mesh.position.x + moveX;
          const nextZ = this.mesh.position.z + moveZ;

          if (isLand(nextX, nextZ) && !isMountainBlocked(nextX, nextZ) && !isSea(nextX, nextZ)) {
            this.mesh.position.x = nextX;
            this.mesh.position.z = nextZ;

            // 방향 회전
            const angle = Math.atan2(dx, dz);
            this.mesh.rotation.y = angle;
          } else {
            // 충돌했으면 새로운 목표 설정
            this.setNewTarget(playerPos);
          }
        }

        // 플레이어와의 상호작용 (근처에 가면 인사)
        const distToPlayer = Math.hypot(
          playerPos.x - this.mesh.position.x,
          playerPos.z - this.mesh.position.z
        );

        if (distToPlayer < this.greetDistance) {
          if (!this.hasGreeted.greeted) {
            showToast("🐰 안녕하세요!");
            this.hasGreeted.greeted = true;
            this.hasGreeted.time = Date.now();
          }
        } else {
          // 거리가 멀어지면 인사 상태 리셋
          if (Date.now() - (this.hasGreeted.time || 0) > 3000) {
            this.hasGreeted = {};
          }
        }
      }

      setNewTarget(playerPos) {
        // 랜덤한 위치 또는 플레이어 주변 탐색
        let found = false;
        let attempts = 0;

        while (!found && attempts < 18) {
          const angle = Math.random() * Math.PI * 2;
          const distance = 24 + Math.random() * this.roamRadius;
          const x = this.homeX + Math.cos(angle) * distance;
          const z = this.homeZ + Math.sin(angle) * distance;

          if (isLand(x, z) && !isMountainBlocked(x, z) && !isSea(x, z)) {
            this.targetX = x;
            this.targetZ = z;
            found = true;
          }
          attempts++;
        }

        if (!found) {
          // 실패 시 현재 위치 유지
          this.targetX = this.mesh.position.x;
          this.targetZ = this.mesh.position.z;
        }
      }
    }

    function initRabbits() {
      // 토끼 2마리 생성
      const mokpo = cities.Mokpo?.position || project(CITY_DATA.Mokpo[2], CITY_DATA.Mokpo[3]);
      const homeX = mokpo.x + 115;
      const homeZ = mokpo.z + 48;
      const rabbit1 = new RabbitNPC(homeX - 28, homeZ + 12, { homeX, homeZ, roamRadius: 118 });
      const rabbit2 = new RabbitNPC(homeX + 36, homeZ - 20, { homeX, homeZ, roamRadius: 118 });

      rabbits.push(rabbit1, rabbit2);
      rabbitGroup.add(rabbit1.mesh);
      rabbitGroup.add(rabbit2.mesh);
    }

    function updateRabbits(playerPos, deltaTime) {
      for (const rabbit of rabbits) {
        rabbit.update(playerPos, deltaTime);
      }
    }

    function pointInPolygon(lon, lat, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i, i += 1) {
        const xi = polygon[i][0], yi = polygon[i][1];
        const xj = polygon[j][0], yj = polygon[j][1];
        const intersect = ((yi > lat) !== (yj > lat)) && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function insideIslandWorld(x, z, island) {
      const c = project(island.lon, island.lat);
      const angle = -island.angle * Math.PI / 180;
      const dx = x - c.x;
      const dz = z - c.z;
      const rx = dx * Math.cos(angle) - dz * Math.sin(angle);
      const rz = dx * Math.sin(angle) + dz * Math.cos(angle);
      return (rx * rx) / (island.rx * island.rx) + (rz * rz) / (island.rz * island.rz) <= 1;
    }

    function distanceToSegment2D(x, z, a, b) {
      const abx = b.x - a.x;
      const abz = b.z - a.z;
      const apx = x - a.x;
      const apz = z - a.z;
      const lengthSq = abx * abx + abz * abz;
      if (lengthSq === 0) return Math.hypot(apx, apz);
      const t = Math.max(0, Math.min(1, (apx * abx + apz * abz) / lengthSq));
      const px = a.x + abx * t;
      const pz = a.z + abz * t;
      return Math.hypot(x - px, z - pz);
    }

    function isNearMountainPass(x, z, range) {
      return range.passes.some(([lon, lat]) => {
        const pass = project(lon, lat);
        return Math.hypot(x - pass.x, z - pass.z) <= range.passRadius;
      });
    }

    function isMountainBlocked(x, z) {
      for (const range of MOUNTAIN_RANGES) {
        if (isNearMountainPass(x, z, range)) continue;
        const points = range.points.map(([lon, lat]) => project(lon, lat));
        for (let i = 0; i < points.length - 1; i += 1) {
          if (distanceToSegment2D(x, z, points[i], points[i + 1]) <= range.width) {
            return true;
          }
        }
      }
      return false;
    }

    function isLand(x, z) {
      if (koreaTerrain?.isLand?.(x, z)) return true;
      const [lon, lat] = lonLatFromWorld(x, z);
      if (pointInPolygon(lon, lat, MAINLAND_LL)) return true;
      if (LAND_REINFORCEMENTS.some((patch) => insideIslandWorld(x, z, patch))) return true;
      return ISLANDS.some((island) => insideIslandWorld(x, z, island));
    }

    function isSea(x, z) {
      // 대한민국 영역 내 바다 판정 (경계 내 비육지 영역)
      const [lon, lat] = lonLatFromWorld(x, z);
      // 한반도 범위 내
      const inRange = lon >= 124 && lon <= 133 && lat >= 32 && lat <= 40;
      // 범위 내이면서 육지가 아니면 바다
      return inRange && !isLand(x, z);
    }

    function canStandAt(x, z) {
      // 육지에 서있거나 바다에서 걸을 수 있음
      const onLand = isLand(x, z) && (!SHOW_MOUNTAINS || !isMountainBlocked(x, z));
      const onSea = isSea(x, z);
      return onLand || onSea;
    }

    function landingPosition(city) {
      const offsets = [
        new THREE.Vector3(46, 0, 54),
        new THREE.Vector3(-54, 0, 42),
        new THREE.Vector3(58, 0, -38),
        new THREE.Vector3(-42, 0, -54),
        new THREE.Vector3(0, 0, 0),
      ];
      for (const offset of offsets) {
        const candidate = city.position.clone().add(offset).setY(PLAYER_Y);
        if (canStandAt(candidate.x, candidate.z)) return candidate;
      }
      return city.position.clone().setY(PLAYER_Y);
    }

    function closestCity(position, range = 115) {
      let best = null;
      let bestDist = range;
      for (const city of Object.values(cities)) {
        const dist = city.position.distanceTo(position);
        if (dist < bestDist) {
          best = city;
          bestDist = dist;
        }
      }
      return best;
    }

    function ferryTarget(position, range = 78) {
      for (const [a, b] of FERRIES) {
        if (cities[a].position.distanceTo(position) < range) return cities[b];
        if (cities[b].position.distanceTo(position) < range) return cities[a];
      }
      return null;
    }

    function disposeCostumeObject(object) {
      object.traverse((node) => {
        if (!node.isMesh) return;
        node.geometry?.dispose();
        if (Array.isArray(node.material)) node.material.forEach((material) => material.dispose());
        else node.material?.dispose();
      });
    }

    function buildCostumeMesh(costume) {
      const style = costume.style;
      const group = new THREE.Group();
      group.name = `Costume3D_${costume.key}`;

      const mat = (color) => new THREE.MeshStandardMaterial({ color, roughness: 0.82, metalness: 0, flatShading: true });
      const jacket = mat(style.jacket);
      const trim = mat(style.trim);
      const pants = mat(style.pants);
      const hat = mat(style.hat);
      const accent = mat(style.accent);
      const dark = mat(0x111111);
      const white = mat(0xffffff);

      const cube = (size, pos, material, rot = [0, 0, 0]) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), material);
        mesh.position.set(pos[0], pos[1], pos[2]);
        mesh.rotation.set(rot[0], rot[1], rot[2]);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
        return mesh;
      };

      cube([44, 40, 24], [0, 7, 3], jacket);
      cube([46, 8, 26], [0, 25, 4], trim);
      cube([11, 36, 27], [-23, 6, 4], trim);
      cube([11, 36, 27], [23, 6, 4], trim);
      cube([18, 30, 17], [-9, -7, 3], pants);
      cube([18, 30, 17], [9, -7, 3], pants);
      cube([23, 8, 20], [-9, -23, 8], dark);
      cube([23, 8, 20], [9, -23, 8], dark);
      cube([58, 12, 36], [0, 66, 0], hat);
      cube([36, 20, 26], [0, 77, 4], hat);
      cube([22, 8, 27], [0, 90, 7], accent);

      if (style.accessory === "fan") {
        cube([28, 34, 4], [32, 10, 22], white, [0, 0, -0.22]);
        cube([24, 5, 5], [32, -9, 23], accent, [0, 0, -0.22]);
      } else if (style.accessory === "sash") {
        cube([8, 52, 28], [-8, 8, 9], accent, [0, 0, -0.42]);
        cube([10, 14, 30], [16, -14, 9], accent, [0, 0, -0.42]);
      } else if (style.accessory === "drum") {
        const drum = new THREE.Mesh(new THREE.CylinderGeometry(14, 14, 11, 12), accent);
        drum.position.set(31, 4, 21);
        drum.rotation.x = Math.PI / 2;
        drum.castShadow = true;
        group.add(drum);
        cube([4, 30, 4], [42, 16, 21], dark, [0.4, 0, -0.35]);
      } else if (style.accessory === "wave") {
        cube([36, 8, 6], [0, 28, 20], accent);
        cube([20, 8, 6], [-20, 19, 21], trim);
        cube([20, 8, 6], [20, 19, 21], trim);
      } else if (style.accessory === "haenyeo") {
        cube([48, 8, 29], [0, 28, 8], accent);
        cube([16, 10, 6], [-9, 49, 24], trim);
        cube([16, 10, 6], [9, 49, 24], trim);
        cube([36, 8, 7], [0, 49, 25], dark);
        cube([12, 46, 12], [-29, 3, 5], jacket);
        cube([12, 46, 12], [29, 3, 5], jacket);
        cube([26, 10, 30], [-12, -30, 15], trim);
        cube([26, 10, 30], [12, -30, 15], trim);
        cube([22, 48, 12], [0, 18, -25], accent);
        cube([26, 12, 16], [0, 42, -31], hat);
        cube([7, 48, 7], [34, 4, 20], accent, [0.2, 0, -0.1]);
        cube([18, 16, 10], [41, 25, 22], trim);
      } else if (style.accessory === "shell") {
        cube([15, 15, 7], [30, 12, 20], accent, [0, 0, 0.8]);
        cube([9, 20, 6], [-27, 13, 19], white, [0, 0, -0.45]);
      }

      return group;
    }

    function equipCostume(cityKey) {
      const costume = costumeForCity(cityKey);

    function isEditableTarget(target) {
      if (!target || !target.tagName) return false;
      return target.isContentEditable || ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    }

    function todayInputValue() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function readStoredArray(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function normalizeCultureDiary(entry) {
      if (!entry) return null;
      const id = entry.id || `diary-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      const title = String(entry.title || "문화 여행 기록").trim();
      const place = String(entry.place || entry.location || "문화거점").trim();
      const memo = String(entry.memo || entry.content || entry.text || "").trim();
      return {
        id,
        title,
        place,
        date: entry.date || entry.dateISO || todayInputValue(),
        mood: entry.mood || "느긋함",
        tone: entry.tone || "sage",
        texture: entry.texture || "grid",
        frame: entry.frame || "polaroid",
        sticker: entry.sticker || "flower",
        memo,
        photo: entry.photo || entry.image || "",
        cards: Array.isArray(entry.cards) ? entry.cards : entry.sticker ? [entry.sticker] : [],
        sourcePlaceId: entry.sourcePlaceId || "",
        cityKey: entry.cityKey || "",
        lng: Number.isFinite(Number(entry.lng)) ? Number(entry.lng) : null,
        lat: Number.isFinite(Number(entry.lat)) ? Number(entry.lat) : null,
        mapLabel: entry.mapLabel || "",
        createdAt: entry.createdAt || new Date().toISOString(),
        worldMapMarker: entry.worldMapMarker === true,
      };
    }

    function loadCultureDiaries() {
      const combined = [
        ...readStoredArray(CULTURE_DIARY_STORAGE_KEY),
        ...readStoredArray(SOYUN_DIARY_STORAGE_KEY),
      ];
      const byId = new Map();
      combined.map(normalizeCultureDiary).filter(Boolean).forEach((entry) => byId.set(entry.id, entry));
      return Array.from(byId.values()).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
    }

    function persistCultureDiaries(entries) {
      const normalized = entries.map(normalizeCultureDiary).filter(Boolean);
      try {
        localStorage.setItem(CULTURE_DIARY_STORAGE_KEY, JSON.stringify(normalized));
        localStorage.setItem(SOYUN_DIARY_STORAGE_KEY, JSON.stringify(normalized.map((entry) => ({
          id: entry.id,
          title: entry.title,
          place: entry.place,
          date: entry.date,
          memo: entry.memo,
          mood: entry.mood,
          tone: entry.tone,
          texture: entry.texture,
          sticker: entry.sticker || entry.cards[0] || "flower",
          frame: entry.frame,
          photo: entry.photo,
          cityKey: entry.cityKey,
          lng: entry.lng,
          lat: entry.lat,
          mapLabel: entry.mapLabel,
          createdAt: entry.createdAt,
          worldMapMarker: entry.worldMapMarker === true,
        }))));
        return true;
      } catch {
        return false;
      }
    }

    function normalizeCultureText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function findCultureCityKey(value) {
      const query = normalizeCultureText(value);
      if (!query) return null;
      for (const [key, [label, meta]] of Object.entries(CITY_DATA)) {
        const keyName = key.toLowerCase();
        const cityName = label.toLowerCase();
        const metaName = meta.toLowerCase();
        if (query === keyName || query === cityName || query.includes(cityName) || keyName.includes(query) || metaName.includes(query)) {
          return key;
        }
      }
      return null;
    }

    function culturePlacePosition(place) {
      return cities[place.cityKey]?.position || project(place.lng, place.lat);
    }

    function formatDiaryMapDate(dateValue) {
      const [year, month, day] = String(dateValue || todayInputValue()).split("-");
      if (!year || !month || !day) return String(dateValue || "");
      return `${Number(year)}년 ${Number(month)}월 ${Number(day)}일`;
    }

    function inferDiaryMapInfo(entry = {}, selectedPlace = null) {
      if (selectedPlace?.cityKey && CITY_DATA[selectedPlace.cityKey]) {
        const [, , lng, lat] = CITY_DATA[selectedPlace.cityKey];
        return {
          cityKey: selectedPlace.cityKey,
          lng: selectedPlace.lng || lng,
          lat: selectedPlace.lat || lat,
          label: selectedPlace.city || CITY_DATA[selectedPlace.cityKey][0],
        };
      }

      const cityKey = entry.cityKey && CITY_DATA[entry.cityKey]
        ? entry.cityKey
        : findCultureCityKey(`${entry.place || ""} ${entry.title || ""}`);
      if (cityKey && CITY_DATA[cityKey]) {
        const [label, , lng, lat] = CITY_DATA[cityKey];
        return { cityKey, lng, lat, label };
      }

      const [lng, lat] = lonLatFromWorld(player.position.x, player.position.z);
      return {
        cityKey: activeCity?.key || "",
        lng,
        lat,
        label: activeCity?.label || String(entry.place || "문화").replace(/\s+/g, "").slice(0, 6) || "문화",
      };
    }

    function diaryMapTitle(entry) {
      const label = entry.mapLabel || inferDiaryMapInfo(entry).label || "문화";
      return `${formatDiaryMapDate(entry.date)} ${String(label).replace(/여행$/, "")}여행`;
    }

    function diaryMapPosition(entry) {
      if (entry.cityKey && cities[entry.cityKey]) return cities[entry.cityKey].position.clone();
      if (Number.isFinite(Number(entry.lng)) && Number.isFinite(Number(entry.lat))) return project(Number(entry.lng), Number(entry.lat));
      const info = inferDiaryMapInfo(entry);
      return project(info.lng, info.lat);
    }

    function diaryMarkerOffsetPosition(entry, index) {
      const position = diaryMapPosition(entry);
      const cityKey = entry.cityKey || inferDiaryMapInfo(entry).cityKey || "";
      const seed = Array.from(`${cityKey}:${entry.id || index}`).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      const angle = (seed % 360) * Math.PI / 180;
      const ring = index % 3;
      const distance = 118 + ring * 34;
      position.x += Math.cos(angle) * distance;
      position.z += Math.sin(angle) * distance;
      return position;
    }

    function scoreCulturePlace(place, startKey, endKey, tokens) {
      const pos = culturePlacePosition(place);
      const start = startKey ? cities[startKey] : null;
      const end = endKey ? cities[endKey] : null;
      let routeDistance = 0;
      if (start && end) {
        routeDistance = distanceToSegment2D(pos.x, pos.z, start.position, end.position);
      } else if (start || end) {
        routeDistance = pos.distanceTo((start || end).position);
      } else if (activeCity) {
        routeDistance = pos.distanceTo(activeCity.position);
      } else {
        routeDistance = pos.distanceTo(player.position);
      }

      const text = normalizeCultureText(`${place.city} ${place.name} ${place.category} ${place.title} ${place.description} ${place.tags.join(" ")}`);
      const keywordScore = tokens.reduce((sum, token) => sum + (text.includes(token) ? 1100 : 0), 0);
      const endpointScore = [startKey, endKey].includes(place.cityKey) ? 620 : 0;
      const nearbyScore = activeCity?.key === place.cityKey ? 180 : 0;
      return {
        place,
        routeDistance,
        score: keywordScore + endpointScore + nearbyScore - routeDistance * 0.42 + place.tags.length * 16,
      };
    }

    function getCultureRecommendations() {
      const startKey = findCultureCityKey(cultureStartInputEl.value);
      const endKey = findCultureCityKey(cultureEndInputEl.value);
      const tokens = normalizeCultureText(cultureKeywordInputEl.value)
        .split(/[\s,]+/)
        .filter(Boolean);
      return HIDDEN_CULTURE_PLACES
        .map((place) => scoreCulturePlace(place, startKey, endKey, tokens))
        .sort((a, b) => b.score - a.score)
        .slice(0, 6);
    }

    function createCultureTags(tags) {
      const wrap = document.createElement("div");
      wrap.className = "culture-tags";
      tags.forEach((tag) => {
        const chip = document.createElement("span");
        chip.className = "culture-tag";
        chip.textContent = tag;
        wrap.append(chip);
      });
      return wrap;
    }

    function cultureSvgPoint(lon, lat) {
      const width = 760;
      const height = 860;
      const padX = 72;
      const padY = 58;
      return {
        x: padX + ((lon - MIN_LON) / (MAX_LON - MIN_LON)) * (width - padX * 2),
        y: padY + ((MAX_LAT - lat) / (MAX_LAT - MIN_LAT)) * (height - padY * 2),
      };
    }

    function culturePathFromLonLat(points) {
      return points
        .map(([lon, lat], index) => {
          const point = cultureSvgPoint(lon, lat);
          return `${index ? "L" : "M"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        })
        .join(" ") + " Z";
    }

    function svgNode(name, attributes = {}) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attributes).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function setupCulture2DMap() {
      if (cultureMapBaseReady) return;
      culture2dLandShapeEl.setAttribute("d", culturePathFromLonLat(MAINLAND_LL));
      culture2dIslandLayerEl.textContent = "";
      ISLANDS.forEach((island) => {
        const point = cultureSvgPoint(island.lon, island.lat);
        const ellipse = svgNode("ellipse", {
          class: "map-island",
          cx: point.x.toFixed(1),
          cy: point.y.toFixed(1),
          rx: island.key === "JejuIsland" ? "58" : island.key === "Ulleungdo" ? "10" : "4",
          ry: island.key === "JejuIsland" ? "26" : island.key === "Ulleungdo" ? "8" : "3",
          transform: `rotate(${island.angle} ${point.x.toFixed(1)} ${point.y.toFixed(1)})`,
        });
        culture2dIslandLayerEl.append(ellipse);
      });

      culture2dCityLayerEl.textContent = "";
      Object.entries(CITY_DATA).forEach(([key, [label, , lon, lat]]) => {
        const point = cultureSvgPoint(lon, lat);
        const group = svgNode("g", { "data-city-key": key });
        group.append(svgNode("circle", {
          class: "map-city-dot",
          cx: point.x.toFixed(1),
          cy: point.y.toFixed(1),
          r: "7",
        }));
        const text = svgNode("text", {
          class: "map-city-label",
          x: (point.x + 10).toFixed(1),
          y: (point.y - 10).toFixed(1),
        });
        text.textContent = label;
        group.append(text);
        culture2dCityLayerEl.append(group);
      });
      cultureMapBaseReady = true;
    }

    function makeCultureMarker(point, label, variant, place = null) {
      const group = svgNode("g", {
        class: `map-route-marker ${variant}`,
        transform: `translate(${point.x.toFixed(1)} ${point.y.toFixed(1)})`,
        tabindex: place ? "0" : "-1",
        role: place ? "button" : "img",
      });
      group.append(svgNode("circle", { r: variant === "place" ? "18" : "22" }));
      const text = svgNode("text");
      text.textContent = label;
      group.append(text);
      if (place) {
        group.addEventListener("click", () => fillCultureDiary(place));
        group.addEventListener("keydown", (event) => {
          if (event.code === "Enter" || event.code === "Space") {
            event.preventDefault();
            fillCultureDiary(place);
          }
        });
      }
      return group;
    }

    function renderCulture2DMap(results, startKey, endKey) {
      setupCulture2DMap();
      culture2dMarkerLayerEl.textContent = "";
      const routePoints = [];
      if (startKey && CITY_DATA[startKey]) {
        const [, , lon, lat] = CITY_DATA[startKey];
        const point = cultureSvgPoint(lon, lat);
        routePoints.push(point);
        culture2dMarkerLayerEl.append(makeCultureMarker(point, "S", "start"));
      }

      results.slice(0, 4).forEach(({ place }, index) => {
        const point = cultureSvgPoint(place.lng, place.lat);
        routePoints.push(point);
        culture2dMarkerLayerEl.append(makeCultureMarker(point, String(index + 1), "place", place));
      });

      if (endKey && CITY_DATA[endKey]) {
        const [, , lon, lat] = CITY_DATA[endKey];
        const point = cultureSvgPoint(lon, lat);
        routePoints.push(point);
        culture2dMarkerLayerEl.append(makeCultureMarker(point, "E", "end"));
      }

      culture2dRouteLineEl.setAttribute(
        "points",
        routePoints.map((point) => `${point.x.toFixed(1)},${point.y.toFixed(1)}`).join(" ")
      );
    }

      memo.textContent = entry.memo;

      cultureCandidateCountEl.textContent = results.length.toString();

    function makeDiaryMarker(entry, index) {
      const group = new THREE.Group();
      const pos = diaryMarkerOffsetPosition(entry, index);
      const lift = 0;
      group.position.set(pos.x, LAND_Y + 3, pos.z);
      group.userData.diaryId = entry.id;
      group.userData.entry = entry;
      group.userData.labelLift = 118;

      const stone = new THREE.MeshStandardMaterial({ color: 0x8f8a82, roughness: 0.92, flatShading: true });
      const stoneDark = new THREE.MeshStandardMaterial({ color: 0x5f5b54, roughness: 0.95, flatShading: true });
      const ink = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, flatShading: true });
      const blush = new THREE.MeshStandardMaterial({ color: 0xffb3c3, roughness: 0.82, flatShading: true });
      const gold = new THREE.MeshStandardMaterial({ color: 0xf4b447, roughness: 0.72, flatShading: true });

      const cube = (size, position, material) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), material);
        mesh.position.set(position[0], position[1] + lift, position[2]);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.diaryId = entry.id;
        group.add(mesh);
        return mesh;
      };

      cube([46, 18, 34], [0, 9, 0], stoneDark);
      cube([58, 56, 36], [0, 44, 0], stone);
      cube([70, 24, 46], [0, 84, 0], stone);
      cube([62, 18, 42], [0, 106, 0], stoneDark);
      cube([54, 24, 38], [0, 124, 0], stone);
      cube([36, 16, 30], [0, 144, 0], stone);
      cube([18, 34, 18], [-38, 78, 0], stoneDark);
      cube([18, 34, 18], [38, 78, 0], stoneDark);
      cube([14, 20, 8], [0, 88, 23], stoneDark);
      cube([9, 8, 5], [-15, 92, 25], ink);
      cube([9, 8, 5], [15, 92, 25], ink);
      cube([10, 8, 5], [-25, 76, 24], blush);
      cube([10, 8, 5], [25, 76, 24], blush);
      cube([25, 8, 8], [-17, 48, 23], stoneDark);
      cube([25, 8, 8], [17, 48, 23], stoneDark);
      cube([22, 8, 7], [0, 66, 25], ink);
      cube([11, 11, 8], [-70, 138, 0], gold);
      cube([11, 11, 8], [70, 116, 0], gold);
      cube([11, 11, 8], [-58, 30, 0], gold);

      const label = document.createElement("button");
      label.className = "diary-map-label";
      label.type = "button";
      label.textContent = diaryMapTitle(entry);
      label.addEventListener("click", () => openDiaryMapEntry(entry.id));
      labelLayer.append(label);
      group.userData.labelEl = label;
      diaryMarkerGroup.add(group);
      return group;
    }

    function renderDiaryMapMarkers() {
      for (const marker of diaryMarkerGroup.children) {
        marker.userData.labelEl?.remove();
      }
      diaryMarkerGroup.clear();
      loadCultureDiaries().filter((entry) => entry.worldMapMarker).forEach(makeDiaryMarker);
    }

    function updateDiaryMapLabels() {
      for (const marker of diaryMarkerGroup.children) {
        const label = marker.userData.labelEl;
        if (!label) continue;
        const point = marker.position.clone();
        point.y += marker.userData.labelLift || 104;
        point.project(camera);
        const visible = point.z > -1 && point.z < 1;
        const x = (point.x * 0.5 + 0.5) * innerWidth;
        const y = (-point.y * 0.5 + 0.5) * innerHeight;
        const nearby = marker.position.distanceTo(player.position) < 1450;
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
        label.classList.toggle("hidden", !nearby || !visible || y < 0 || y > innerHeight || x < 0 || x > innerWidth);
      }
    }

      cultureDiaryTextureInputEl.value = "grid";
      cultureDiaryFrameInputEl.value = "polaroid";

    function readCulturePhoto(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.addEventListener("load", () => resolve(reader.result || ""));
        reader.addEventListener("error", reject);
        reader.readAsDataURL(file);
      });
    }

    async function handleCulturePhotoChange() {
      const file = cultureDiaryPhotoInputEl.files?.[0];
      cultureDiaryPhoto = "";
      if (!file) return;
      if (!file.type.startsWith("image/")) {
        cultureDiaryStatusEl.textContent = "이미지 파일만 사용할 수 있습니다.";
        cultureDiaryPhotoInputEl.value = "";
        return;
      }
      if (file.size > 700000) {
        cultureDiaryStatusEl.textContent = "사진은 700KB 이하로 넣어주세요.";
        cultureDiaryPhotoInputEl.value = "";
        return;
      }
      cultureDiaryPhoto = await readCulturePhoto(file);
