    function rewardForCard(card, game) {
      return {
        item: card,
        kind: game.material,
        mark: card.slice(0, 1),
        mission: game.title,
      };
    }

    function completeMission(city) {
      if (!city) return;
      const game = REGION_GAMES[city.key];
      const reward = REGION_REWARDS[city.key];
      if (!game && !reward) {
        modalResultEl.textContent = "이 지역의 보상이 아직 준비되지 않았습니다.";
        return;
      }
      if (completedQuests.has(city.key)) {
        const itemName = game ? game.cards.join(", ") : reward.item;
        modalResultEl.textContent = `${itemName}은 이미 인벤토리에 있습니다.`;
        setInventoryOpen(true);
        return;
      }

      completedQuests.add(city.key);
      if (game) {
        game.cards.forEach((card) => {
          inventory.set(`${city.key}:${card}`, { city, reward: rewardForCard(card, game) });
        });
        addCostumeReward(city);
      } else {
        inventory.set(city.key, { city, reward });
      }
      markVisited(city);
      renderInventory();
      closeLocationPopup();
      closeMiniGame();
      setInventoryOpen(true);
      notifyCultureRewardCleared(city, reward);
      showToast(`${city.label} 미션 성공 · 문화카드 해금`);
      updateCityState();
    }

    function openMiniGame(city) {
      const game = REGION_GAMES[city.key];
      if (!game || !window.KoreaCultureMinigames?.create) {
        completeMission(city);
        return;
      }
      activeGameCity = city;
      closeLocationPopup();
      interactionOpen = true;
      gameModalEl.hidden = false;
      gameModalEl.textContent = "";

      minigameInstance = window.KoreaCultureMinigames.create({
        window,
        document,
        container: gameModalEl,
        games: REGION_GAMES,
        onComplete: (payload) => {
          if (!activeGameCity || payload.regionKey !== activeGameCity.key) return;
          completeMission(activeGameCity);
        },
        onClose: closeMiniGame,
      });
      minigameInstance.start(city.key);
    }

    function closeMiniGame() {
      const hadGame = Boolean(activeGameCity);
      activeGameCity = null;
      if (minigameInstance) {
        const instance = minigameInstance;
        minigameInstance = null;
        instance.destroy();
      }
      gameModalEl.textContent = "";
      gameModalEl.hidden = true;
      if (!hadGame || !locationModal.hidden) return;
      interactionOpen = false;
    }

    function markVisited(city) {
      if (!city || visited.has(city.key)) return false;
      visited.add(city.key);
      city.node.material.color.set(COLORS.visited);
      visitedCountEl.textContent = `${visited.size}/${Object.keys(cities).length}`;
      return true;
    }

    function openLocationPopup(city) {
      if (!city) return;
      popupCity = city;
      interactionOpen = true;
      modalCityNameEl.textContent = city.label;
      const game = REGION_GAMES[city.key];
      const reward = REGION_REWARDS[city.key];
      const completed = completedQuests.has(city.key);
      modalDescriptionEl.textContent = reward
        ? game
          ? `${city.meta} · ${game.material} · ${game.title}: ${gamePrompt(game)}`
          : `${city.meta} · 미션: ${reward.mission}`
        : `${city.meta}에서 지역 활동을 선택할 수 있습니다.`;
      modalResultEl.textContent = completed
        ? game ? `${game.cards.join(", ")} 문화카드를 이미 획득했습니다.` : `${reward.item}을 이미 획득했습니다.`
        : visited.has(city.key) ? "방문 기록이 남아 있습니다." : "";
      visitActionEl.disabled = visited.has(city.key);
      questActionEl.disabled = completed;
      questActionEl.textContent = completed ? "미션 완료" : game ? "미니게임 시작" : "지역 미션 성공";
      locationModal.hidden = false;
    }

    function closeLocationPopup() {
      interactionOpen = false;
      popupCity = null;
      locationModal.hidden = true;
    }

    visitActionEl.addEventListener("click", () => {
      if (!popupCity) return;
      if (markVisited(popupCity)) {
        modalResultEl.textContent = `${popupCity.label} 방문이 기록되었습니다.`;
        visitActionEl.disabled = true;
        showToast(`${popupCity.label} 방문 기록`);
      }
      updateCityState();
    });

    questActionEl.addEventListener("click", () => {
      if (!popupCity) return;
      openMiniGame(popupCity);
    });

    inventoryToggleEl.addEventListener("click", () => setInventoryOpen(!inventoryOpen));
    inventoryCloseEl.addEventListener("click", () => setInventoryOpen(false));
    diaryLaunchToggleEl.addEventListener("click", openDiaryApp);
    diaryAppCloseEl.addEventListener("click", closeDiaryApp);
    diaryAppModalEl.addEventListener("click", (event) => {
      if (event.target === diaryAppModalEl) closeDiaryApp();
    });
    cultureRouteToggleEl?.addEventListener("click", openCultureRoutePanel);
    cultureRouteCloseEl?.addEventListener("click", closeCultureRoutePanel);
    cultureMapTabEl?.addEventListener("click", () => switchCultureView("map"));
    cultureDiaryTabEl?.addEventListener("click", () => switchCultureView("diary"));
    cultureRouteFormEl?.addEventListener("submit", (event) => {
      event.preventDefault();
      renderCultureRecommendations();
    });
    cultureRecommendationListEl?.addEventListener("click", (event) => {
      const action = event.target.closest("[data-route-index]");
      if (!action) return;
      const place = cultureLastResults[Number(action.dataset.routeIndex)];
      if (place) fillCultureDiary(place);
    });
    cultureDiaryFormEl?.addEventListener("submit", saveCultureDiary);
    cultureDiaryPhotoInputEl?.addEventListener("change", handleCulturePhotoChange);
    cultureDiaryBackToMapEl?.addEventListener("click", () => switchCultureView("map"));
    cultureDiaryResetEl?.addEventListener("click", resetCultureDiaryForm);
    [
      cultureDiaryTitleInputEl,
      cultureDiaryPlaceInputEl,
      cultureDiaryDateInputEl,
      cultureDiaryMoodInputEl,
      cultureDiaryToneInputEl,
      cultureDiaryTextureInputEl,
      cultureDiaryFrameInputEl,
      cultureDiaryMemoInputEl,
    ].filter(Boolean).forEach((input) => input.addEventListener("input", renderCultureDiaryPreview));
    cultureDiaryListEl?.addEventListener("click", (event) => {
      const action = event.target.closest("[data-diary-id]");
      if (action) deleteCultureDiary(action.dataset.diaryId);
    });
    diaryMapCloseEl.addEventListener("click", closeDiaryMapEntry);
    diaryMapModalEl.addEventListener("click", (event) => {
      if (event.target === diaryMapModalEl) closeDiaryMapEntry();
    });
    cultureRouteModalEl?.addEventListener("click", (event) => {
      if (event.target === cultureRouteModalEl) closeCultureRoutePanel();
    });

    // 토끼 NPC 초기화
    initRabbits();

    modalCloseEl.addEventListener("click", closeLocationPopup);
    locationModal.addEventListener("click", (event) => {
      if (event.target === locationModal) closeLocationPopup();
    });

    if (!koreaTerrain) {
      makeLandMesh(shapeFromLonLat(MAINLAND_LL), COLORS.land, COLORS.landEdge);
      for (const island of ISLANDS) {
        makeLandMesh(islandShape(island), COLORS.landIsland, COLORS.landEdge);
      }
      for (const patch of LAND_REINFORCEMENTS) {
        makeFlatLandPatch(patch);
      }
      for (const islet of COAST_ISLETS) {
        makeLandMesh(islandShape(islet, 26), COLORS.landIslet, COLORS.landEdge);
      }
    }
    if (SHOW_MOUNTAINS) {
      TERRAIN_PATCHES.forEach(makeTerrainPatch);
      REGION_LINES.forEach((line) => addRaisedPath(line, { color: COLORS.regionLine, radius: 2.4, y: LAND_Y + 19, opacity: 0.42 }));
      RIDGE_LINES.forEach((line) => addRaisedPath(line, { color: 0xdadad4, radius: 7.5, y: LAND_Y + 22, opacity: 1 }));
      MOUNTAIN_RANGES.forEach(addMountainRange);
    }
    addCherryGroves();
    addCamelliaGrove();

    Object.entries(CITY_DATA).forEach(([key, [label, meta, lon, lat]]) => addCity(key, label, meta, lon, lat));
    addHelloJejuSign();
    ROADS.forEach(([a, b]) => addRoad(a, b, false));

    const player = buildPlayer();
    player.scale.setScalar(0.62);
    const startCityKey = new URLSearchParams(location.search).get("start");
    player.position.copy(landingPosition(cities[startCityKey] || cities.Gwangju));
    scene.add(player);

    // 바나나보트 생성
    const bananaBoat = buildBananaBoat();
    bananaBoat.scale.setScalar(0.75); // 더 크게 조정
    bananaBoat.visible = false; // 처음에는 숨김
    scene.add(bananaBoat);

    const playerVelocity = new THREE.Vector3();
    const pointer = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    const clickPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -PLAYER_Y);
    const clickPoint = new THREE.Vector3();
    let walkTarget = null;
    const cameraTarget = new THREE.Vector3();
    const cameraGoal = new THREE.Vector3();
    let activeCity = cities.Gwangju;

    // 점프 관련 변수
    let isJumping = false;
    let jumpVelocity = 0;
    const JUMP_FORCE = 320; // 점프 힘
    const GRAVITY = 800; // 중력
    let jumpCooldown = 0;

    // T 키 점프 이벤트 리스너
    window.addEventListener("keydown", (event) => {
      if (event.code === "KeyT" && !isJumping && jumpCooldown <= 0) {
        isJumping = true;
        jumpVelocity = JUMP_FORCE;
        jumpCooldown = 0.2; // 연속 점프 방지
      }
    });

    snapCameraToPlayer();

    const grid = new THREE.GridHelper(14000, 72, 0xd1d1ca, 0xc4c5bf);
    grid.position.y = 0.1;
    grid.material.transparent = true;
    grid.material.opacity = 0.28;
    scene.add(grid);

    for (let i = 0; i < 42; i += 1) {
      const cloud = new THREE.Mesh(
        new THREE.SphereGeometry(10 + Math.random() * 16, 12, 8),
        new THREE.MeshStandardMaterial({ color: 0xe9f4ef, roughness: 1, transparent: true, opacity: 0.16 })
      );
      cloud.scale.set(1 + Math.random() * 2.5, 0.18, 0.55 + Math.random());
      cloud.position.set((Math.random() - 0.5) * 9800, 160 + Math.random() * 160, (Math.random() - 0.5) * 9000);
      scene.add(cloud);
    }

    function cameraSettings() {
      return {
        lift: innerWidth < 760 ? 250 : 230,
        back: innerWidth < 760 ? 320 : 290,
      };
    }

    function snapCameraToPlayer() {
      const { lift, back } = cameraSettings();
      cameraTarget.copy(player.position);
      cameraTarget.y = LAND_Y;
      camera.position.set(player.position.x, lift, player.position.z + back);
      camera.lookAt(cameraTarget.x, cameraTarget.y + 26, cameraTarget.z);
    }

    function updateCityState() {
      activeCity = closestCity(player.position);
      const target = ferryTarget(player.position);
      if (activeCity) {
        currentCityEl.textContent = activeCity.label;
        cityNameEl.textContent = activeCity.label;
        cityMetaEl.textContent = visited.has(activeCity.key) ? `${activeCity.meta} · 기록 완료` : `${activeCity.meta} · 지역 활동 가능`;
      } else if (target) {
        currentCityEl.textContent = "항구";
        cityNameEl.textContent = `${target.label}행 페리`;
        cityMetaEl.textContent = "항구 근처에서 바닷길이 열립니다";
      } else {
        currentCityEl.textContent = "이동 중";
        cityNameEl.textContent = "이동 중";
        cityMetaEl.textContent = "가까운 도시를 향해 이동";
      }
      visitedCountEl.textContent = `${visited.size}/${Object.keys(cities).length}`;
    }

    function updateLabels() {
      for (const city of Object.values(cities)) {
        const point = city.position.clone();
        point.y += city.labelLift || 92;
        point.project(camera);
        const visible = point.z > -1 && point.z < 1;
        const nearby = city.position.distanceTo(player.position) < 1250 || city === activeCity;
        const x = (point.x * 0.5 + 0.5) * innerWidth;
        const y = (-point.y * 0.5 + 0.5) * innerHeight;
        city.labelEl.style.left = `${x}px`;
        city.labelEl.style.top = `${y}px`;
        city.labelEl.classList.toggle("hidden", !nearby || !visible || y < 0 || y > innerHeight || x < 0 || x > innerWidth);
      }
    }

    function drawMinimap() {
      const width = minimap.width;
      const height = minimap.height;
      miniCtx.clearRect(0, 0, width, height);
      miniCtx.fillStyle = "rgba(27, 62, 75, 0.88)";
      miniCtx.fillRect(0, 0, width, height);

      function mapPoint(pos) {
        return {
          x: (pos.x / WORLD_W + 0.5) * width,
          y: (pos.z / WORLD_D + 0.5) * height,
        };
      }

      function mapLonLat(lon, lat) {
        return mapPoint(project(lon, lat));
      }

      miniCtx.fillStyle = "rgba(105, 184, 106, 0.42)";
      miniCtx.strokeStyle = "rgba(180, 232, 180, 0.45)";
      miniCtx.lineWidth = 1;
      MAINLAND_LL.forEach(([lon, lat], index) => {
        const p = mapLonLat(lon, lat);
        if (index === 0) {
          miniCtx.beginPath();
          miniCtx.moveTo(p.x, p.y);
        } else {
          miniCtx.lineTo(p.x, p.y);
        }
      });
      miniCtx.closePath();
      miniCtx.fill();
      miniCtx.stroke();

      for (const island of ISLANDS) {
        const center = mapLonLat(island.lon, island.lat);
        miniCtx.beginPath();
        miniCtx.ellipse(
          center.x,
          center.y,
          island.rx / WORLD_W * width,
          island.rz / WORLD_D * height,
          island.angle * Math.PI / 180,
          0,
          Math.PI * 2
        );
        miniCtx.fill();
      }

      for (const patch of LAND_REINFORCEMENTS) {
        const center = mapLonLat(patch.lon, patch.lat);
        miniCtx.beginPath();
        miniCtx.ellipse(
          center.x,
          center.y,
          patch.rx / WORLD_W * width,
          patch.rz / WORLD_D * height,
          patch.angle * Math.PI / 180,
          0,
          Math.PI * 2
        );
        miniCtx.fill();
      }

      miniCtx.strokeStyle = "rgba(244, 248, 234, 0.18)";
      miniCtx.lineWidth = 1;
      for (const [a, b] of ROADS) {
        const pa = mapPoint(cities[a].position);
        const pb = mapPoint(cities[b].position);
        miniCtx.beginPath();
        miniCtx.moveTo(pa.x, pa.y);
        miniCtx.lineTo(pb.x, pb.y);
        miniCtx.stroke();
      }

      for (const city of Object.values(cities)) {
        const p = mapPoint(city.position);
        miniCtx.beginPath();
        miniCtx.fillStyle = visited.has(city.key) ? "#70e5a4" : "#fff4c4";
        miniCtx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        miniCtx.fill();
      }

      const pp = mapPoint(player.position);
      miniCtx.beginPath();
      miniCtx.fillStyle = "#f45b5b";
      miniCtx.arc(pp.x, pp.y, 5, 0, Math.PI * 2);
      miniCtx.fill();
    }

    function movePlayer(dt) {
      if (interactionOpen || inventoryOpen || diaryAppOpen) {
        playerVelocity.multiplyScalar(Math.max(0, 1 - 8 * dt));
        return;
      }

      const input = new THREE.Vector3();
      if (keys.has("KeyW") || keys.has("ArrowUp")) input.z -= 1;
      if (keys.has("KeyS") || keys.has("ArrowDown")) input.z += 1;
      if (keys.has("KeyA") || keys.has("ArrowLeft")) input.x -= 1;
      if (keys.has("KeyD") || keys.has("ArrowRight")) input.x += 1;

      if (input.lengthSq() > 0) {
        walkTarget = null;
      } else if (walkTarget) {
        const toTarget = walkTarget.clone().sub(player.position);
        toTarget.y = 0;
        if (toTarget.length() < 30) {
          walkTarget = null;
        } else {
          input.copy(toTarget.normalize());
        }
      }

      if (input.lengthSq() > 0) {
        input.normalize();
        const sprint = keys.has("ShiftLeft") || keys.has("ShiftRight");
        playerVelocity.addScaledVector(input, (sprint ? 920 : 540) * dt);
        player.rotation.y = Math.atan2(input.x, input.z);
      } else {
        playerVelocity.multiplyScalar(Math.max(0, 1 - 5.4 * dt));
      }

      const maxSpeed = keys.has("ShiftLeft") || keys.has("ShiftRight") ? 390 : 235;
      if (playerVelocity.length() > maxSpeed) playerVelocity.setLength(maxSpeed);

      const old = player.position.clone();
      const next = old.clone().addScaledVector(playerVelocity, dt);
      if (canStandAt(next.x, next.z)) {
        player.position.copy(next);
      } else {
        const slideX = new THREE.Vector3(next.x, PLAYER_Y, old.z);
        const slideZ = new THREE.Vector3(old.x, PLAYER_Y, next.z);
        if (canStandAt(slideX.x, slideX.z)) player.position.copy(slideX);
        else if (canStandAt(slideZ.x, slideZ.z)) player.position.copy(slideZ);
        playerVelocity.multiplyScalar(0.18);
      }

      // 바다에서 바나나보트 타기
      const onSea = isSea(player.position.x, player.position.z);
      bananaBoat.visible = onSea;

      if (onSea) {
        // 바나나보트 위치 동기화
        bananaBoat.position.copy(player.position);
        bananaBoat.position.y = PLAYER_Y - 30; // 보트 위치
        bananaBoat.rotation.y = player.rotation.y;

        // 물결 효과 (위아래로 흔들림)
        const wobble = Math.sin(performance.now() * 0.004) * 3;
        bananaBoat.position.y += wobble;

        // 물결 회전
        bananaBoat.rotation.z = Math.sin(performance.now() * 0.003) * 0.05;

        // 플레이어를 보트 위에 배치
        player.position.copy(bananaBoat.position);
        player.position.y = PLAYER_Y + 15; // 보트 위 높이
        player.rotation.y = bananaBoat.rotation.y;
      } else {
        // 육지에서는 일반 플레이어 애니메이션
        // 점프 물리
        if (isJumping) {
          jumpVelocity -= GRAVITY * dt; // 중력 적용
          player.position.y += jumpVelocity * dt; // Y 위치 업데이트

          // 착지 감지
          if (player.position.y <= PLAYER_Y) {
            player.position.y = PLAYER_Y;
            isJumping = false;
            jumpVelocity = 0;
          }
        } else {
          // 점프 중이 아닐 때 기본 애니메이션
          player.position.y = PLAYER_Y + Math.sin(performance.now() * 0.006) * 1.4;
        }
      }

      // 점프 쿨다운 감소
      if (jumpCooldown > 0) {
        jumpCooldown -= dt;
      }

      // 토끼 NPC 업데이트
      updateRabbits(player.position, dt);
    }

    function updateCamera(dt) {
      cameraTarget.copy(player.position);
      cameraTarget.y = LAND_Y;
      const { lift, back } = cameraSettings();
      cameraGoal.set(player.position.x, lift, player.position.z + back);
      camera.position.lerp(cameraGoal, Math.min(1, 8.5 * dt));
      camera.lookAt(cameraTarget.x, cameraTarget.y + 26, cameraTarget.z);
    }

    function handleSpecialKeys(event) {
      if (event.repeat) return;
      if (isEditableTarget(event.target)) {
        if (event.code === "Escape" && diaryAppOpen) closeDiaryApp();
        return;
      }
      if (event.code === "Escape" && diaryAppOpen) {
        closeDiaryApp();
        return;
      }
      if (event.code === "Escape" && !diaryMapModalEl.hidden) {
        closeDiaryMapEntry();
        return;
      }
      if (event.code === "Escape" && activeGameCity) {
        closeMiniGame();
        return;
      }
      if (event.code === "KeyI") {
        event.preventDefault();
        setInventoryOpen(!inventoryOpen);
        return;
      }
      if (event.code === "Escape" && inventoryOpen) {
        setInventoryOpen(false);
        return;
      }
      if (event.code === "Escape" && interactionOpen) {
        closeLocationPopup();
        return;
      }
      if (interactionOpen) return;

      if (event.code === "Space") {
        event.preventDefault();
        const city = closestCity(player.position, 125);
        if (city) {
          openLocationPopup(city);
        } else {
          showToast("가까운 지역이 없습니다");
        }
      }

      if (event.code === "Enter") {
        const target = ferryTarget(player.position);
        if (target) {
          player.position.copy(landingPosition(target));
          playerVelocity.set(0, 0, 0);
          showToast(`${target.label} 도착`);
          updateCityState();
        }
      }
    }

    function handleMapPointer(event) {
      if (interactionOpen || inventoryOpen || diaryAppOpen || activeGameCity) return;
      if (event.target !== renderer.domElement) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const diaryHit = raycaster.intersectObjects(diaryMarkerGroup.children, true)[0];
      if (diaryHit) {
        let node = diaryHit.object;
        while (node && !node.userData.diaryId) node = node.parent;
        if (node?.userData.diaryId) {
          openDiaryMapEntry(node.userData.diaryId);
          return;
        }
      }
      if (!raycaster.ray.intersectPlane(clickPlane, clickPoint)) return;
      if (!canStandAt(clickPoint.x, clickPoint.z)) {
        showToast("지도 위 땅을 눌러 이동해요");
        return;
      }
      walkTarget = clickPoint.clone();
      walkTarget.y = PLAYER_Y;
      startWorldBgm();
    }

    addEventListener("keydown", (event) => {
      if (!isEditableTarget(event.target)) keys.add(event.code);
      if (!isEditableTarget(event.target) && MOVEMENT_CODES.has(event.code)) startWorldBgm();
      handleSpecialKeys(event);
    });

    addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    renderer.domElement.addEventListener("pointerdown", handleMapPointer);

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(1);
    });

    function updateCameraFacingLandmarks() {
      cityGroup.children.forEach((node) => {
        if (!node.userData?.faceCamera) return;
        const dx = camera.position.x - node.position.x;
        const dz = camera.position.z - node.position.z;
        node.rotation.y = Math.atan2(dx, dz);
      });
    }

    let last = performance.now();
    function animate(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      movePlayer(dt);
      updateCamera(dt);
      updateCameraFacingLandmarks();
      updateCityState();
      updateLabels();
      updateDiaryMapLabels();
      drawMinimap();
      roadsGroup.rotation.y = Math.sin(now * 0.0004) * 0.002;
      if (player.userData.tail) {
        player.userData.tail.rotation.y = Math.sin(now * 0.006) * 0.12;
      }
      speedValueEl.textContent = Math.round(playerVelocity.length()).toString();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    renderInventory();
    renderDiaryMapMarkers();
    updateCityState();
    showToast("광주에서 출발");
    requestAnimationFrame(animate);
  </script>
</body>
</html>
